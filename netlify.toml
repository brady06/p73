# Build the Vite app; static files from dist. Functions live in netlify/functions/
#
# Required Netlify UI / dashboard environment variables (do not commit secrets):
#   OPENAI_API_KEY  — required for bias scoring
#   OPENAI_MODEL    — optional; defaults to gpt-4o-mini in the function code

[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
